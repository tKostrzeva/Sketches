<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chladni tool v03</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
</head>
<body>

<div id="canvas-wrap"></div>

<button id="toggle-btn" aria-label="Toggle controls">&#9776;</button>

<aside id="panel">
  <div class="panel-header">
    <div class="panel-title">Chladni v03</div>
    <button id="close-btn" aria-label="Close">&#10005;</button>
  </div>

  <div class="ctrl">
    <div class="ctrl-label">Point Scale <span class="val" id="pointSize-v">1.5</span></div>
    <input type="range" id="pointSize" min="0.5" max="5.0" value="1.5" step="0.5">
  </div>

  <div class="ctrl">
    <div class="ctrl-label">Spread <span class="val" id="spread-v">0.30</span></div>
    <input type="range" id="spread" min="0.05" max="2.00" value="0.30" step="0.05">
  </div>

  <div class="ctrl">
    <div class="ctrl-label">Resolution <span class="val" id="resolution-v">1</span></div>
    <input type="range" id="resolution" min="1" max="8" value="1" step="1">
  </div>

  <div class="divider"></div>

  <div class="ctrl">
    <div class="ctrl-label">Noise Seed <span class="val" id="seed-v">42</span></div>
    <input type="range" id="seed" min="0" max="999" value="42" step="1">
  </div>

  <div class="ctrl">
    <div class="ctrl-label">N <span class="val" id="nMode-v">3</span></div>
    <input type="range" id="nMode" min="1" max="8" value="3" step="1">
  </div>

  <div class="ctrl">
    <div class="ctrl-label">M <span class="val" id="mMode-v">2</span></div>
    <input type="range" id="mMode" min="1" max="8" value="2" step="1">
  </div>

  <div class="divider"></div>

  <div class="color-row">
    <div class="color-item">
      <label>Particles</label>
      <input type="color" id="particleColor" value="#ffffff">
    </div>
    <div class="color-item">
      <label>Background</label>
      <input type="color" id="bgColor" value="#000000">
    </div>
  </div>

  <div class="divider"></div>

  <div class="export-row">
    <button class="export-btn" id="export-jpg-btn">Export JPG</button>
    <button class="export-btn" id="export-png-btn">Export PNG</button>
  </div>

</aside>

<script src="sketch.js"></script>
</body>
</html>
