<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swarm tool v01</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
</head>
<body>

<div id="canvas-wrap"></div>

<button id="toggle-btn" aria-label="Toggle controls">&#9776;</button>

<aside id="panel">
  <div class="panel-header">
    <div class="panel-title">Swarm v01</div>
    <button id="close-btn" aria-label="Close">&#10005;</button>
  </div>

  <div class="ctrl">
    <div class="ctrl-label">Mirror Count <span class="val" id="mirrors-v">4</span></div>
    <input type="range" id="mirrors" min="1" max="8" value="4" step="1">
  </div>

  <div class="ctrl">
    <div class="ctrl-label">Swarm Count <span class="val" id="swarmCount-v">600</span></div>
    <input type="range" id="swarmCount" min="100" max="3000" value="600" step="100">
  </div>

  <div class="ctrl">
    <div class="ctrl-label">Noise Seed <span class="val" id="seed-v">42</span></div>
    <input type="range" id="seed" min="0" max="999" value="42" step="1">
  </div>

  <div class="ctrl">
    <div class="ctrl-label">Noise Scale <span class="val" id="nscale-v">0.0030</span></div>
    <input type="range" id="nscale" min="0.0005" max="0.0150" value="0.0030" step="0.0005">
  </div>

  <div class="ctrl">
    <div class="ctrl-label">Off X <span class="val" id="offx-v">0.00</span></div>
    <input type="range" id="offx" min="-5" max="5" value="0" step="0.01">
  </div>

  <div class="ctrl">
    <div class="ctrl-label">Off Y <span class="val" id="offy-v">0.00</span></div>
    <input type="range" id="offy" min="-5" max="5" value="0" step="0.01">
  </div>

  <div class="divider"></div>

  <div class="color-row">
    <div class="color-item">
      <label>Particles</label>
      <input type="color" id="particleColor" value="#7040ff">
    </div>
    <div class="color-item">
      <label>Background</label>
      <input type="color" id="bgColor" value="#08080f">
    </div>
  </div>

  <div class="divider"></div>

  <div class="export-row">
    <button class="export-btn" id="export-jpg-btn">Export JPG</button>
    <button class="export-btn" id="export-png-btn">Export PNG</button>
  </div>

</aside>

<script src="sketch.js"></script>
</body>
</html>
