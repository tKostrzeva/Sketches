<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chladni v05</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
</head>
<body>

<div id="canvas-wrap"></div>

<button id="toggle-btn" aria-label="Toggle controls">&#9776;</button>

<aside id="panel">
  <div class="panel-header">
    <div class="panel-title">Chladni v05</div>
    <button id="close-btn" aria-label="Close">&#10005;</button>
  </div>

  <div class="panel-scroll">

    <div class="ctrl">
      <div class="ctrl-label">Wave A <span class="val" id="waveA-v">1.0</span></div>
      <input type="range" id="waveA" min="0" max="10" value="1" step="0.1">
    </div>

    <div class="ctrl">
      <div class="ctrl-label">Wave B <span class="val" id="waveB-v">1.0</span></div>
      <input type="range" id="waveB" min="0" max="10" value="1" step="0.1">
    </div>

    <div class="divider"></div>

    <div class="ctrl">
      <div class="ctrl-label">Zoom <span class="val" id="zoom-v">1.0</span></div>
      <input type="range" id="zoom" min="-10" max="10" value="1" step="0.1">
    </div>

    <div class="ctrl">
      <div class="ctrl-label">Point Scale <span class="val" id="pointScale-v">1.5</span></div>
      <input type="range" id="pointScale" min="0.5" max="5" value="1.5" step="0.5">
    </div>

    <div class="ctrl">
      <div class="ctrl-label">Spread <span class="val" id="spread-v">0.15</span></div>
      <input type="range" id="spread" min="0.01" max="1.0" value="0.15" step="0.01">
    </div>

    <div class="divider"></div>

    <div class="ctrl">
      <div class="ctrl-label">Hue A <span class="val" id="hueA-v">&#9679;</span></div>
      <input type="range" class="hue-slider" id="hueA" min="0" max="360" value="200" step="1">
    </div>

    <div class="ctrl">
      <div class="ctrl-label">Hue B <span class="val" id="hueB-v">&#9679;</span></div>
      <input type="range" class="hue-slider" id="hueB" min="0" max="360" value="40" step="1">
    </div>

  </div>

  <div class="play-row">
    <button class="play-btn" id="play-btn">Play</button>
  </div>

  <div class="export-row">
    <button class="export-btn" id="export-jpg-btn">Export JPG</button>
    <button class="export-btn" id="export-png-btn">Export PNG</button>
  </div>

</aside>

<script src="sketch.js"></script>
</body>
</html>
