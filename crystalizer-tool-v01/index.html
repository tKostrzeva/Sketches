<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crystalizer tool v01</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
</head>
<body>

<div id="canvas-wrap"></div>

<aside id="panel">
  <div class="panel-title">Crystalizer v01</div>

  <div class="ctrl">
    <div class="ctrl-label">Noise Seed <span class="val" id="seed-v">42</span></div>
    <input type="range" id="seed" min="0" max="999" value="42" step="1">
  </div>

  <div class="ctrl">
    <div class="ctrl-label">Noise Scale <span class="val" id="nscale-v">0.30</span></div>
    <input type="range" id="nscale" min="0.01" max="2.00" value="0.30" step="0.01">
  </div>

  <div class="ctrl">
    <div class="ctrl-label">Off X <span class="val" id="offx-v">0.00</span></div>
    <input type="range" id="offx" min="-5" max="5" value="0" step="0.01">
  </div>

  <div class="ctrl">
    <div class="ctrl-label">Off Y <span class="val" id="offy-v">0.00</span></div>
    <input type="range" id="offy" min="-5" max="5" value="0" step="0.01">
  </div>

  <div class="ctrl">
    <div class="ctrl-label">
      Complexity
      <span class="val" id="complexity-v">2 &nbsp;(80 faces)</span>
    </div>
    <input type="range" id="complexity" min="1" max="4" value="2" step="1">
  </div>

  <div class="divider"></div>

  <div class="color-row">
    <div class="color-item">
      <label>Color A</label>
      <input type="color" id="colorA" value="#1a3aff">
    </div>
    <div class="color-item">
      <label>Color B</label>
      <input type="color" id="colorB" value="#ff1a6e">
    </div>
  </div>

  <div class="divider"></div>

  <button id="export-btn">Export PNG</button>

  <div id="hint">drag to orbit &nbsp;·&nbsp; scroll to zoom</div>
</aside>

<script src="sketch.js"></script>
</body>
</html>
